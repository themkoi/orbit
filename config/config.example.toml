# Orbit Configuration
# Copy this file to ~/.config/orbit/config.toml
#
# After editing, apply changes without restarting the daemon:
#   orbit reload-config

# Window position on screen
# Valid values: top-left, top-center, top-right,
#               center-left, center, center-right,
#               bottom-left, bottom-center, bottom-right
position = "top-right"

# Margins (in pixels) from screen edges
margin_top = 10
margin_bottom = 10
margin_left = 10
margin_right = 10

# Animation (optional)
# Window: slidedown, slideup, slideleft, slideright, swingdown, swingup, swingleft, swingright, fade, crossfade, none
window_transition = "slidedown"
window_transition_duration = 200

# Tab switching: slidehorizontal, slidevertical, slidedown, slideup, slideleft, slideright, crossfade, none
stack_transition = "slidehorizontal"
stack_transition_duration = 200
